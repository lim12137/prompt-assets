name: Publish Images

on:
  workflow_dispatch:
  push:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set owner (lowercase)
        id: vars
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          push: true
          tags: ghcr.io/${{ steps.vars.outputs.owner_lc }}/prompt-assets-web:latest

      - name: Mirror postgres 16-alpine to GHCR
        run: |
          docker pull postgres:16-alpine
          docker tag postgres:16-alpine ghcr.io/${{ steps.vars.outputs.owner_lc }}/prompt-assets-postgres:16-alpine
          docker push ghcr.io/${{ steps.vars.outputs.owner_lc }}/prompt-assets-postgres:16-alpine
