name: Phase3 G0 Gate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/phase3-g0-gate.yml"
      - "apps/web/**"
      - "scripts/**"
      - "tests/integration/api/prompt-like.test.ts"
      - "tests/integration/api/prompt-version-like.test.ts"
      - "tests/integration/api/prompt-detail.test.ts"
      - "tests/integration/api/prompts-list.test.ts"
      - "tests/e2e/smoke/prompt-detail-ux-candidate-like.spec.ts"
      - "playwright.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"

permissions:
  contents: read

jobs:
  build-web:
    name: build:web
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run build:web with memory gate
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: pnpm build:web

  integration-critical:
    name: integration:critical
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run key integration tests
        run: pnpm test:integration:critical

  e2e-critical:
    name: e2e:critical
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run key e2e
        run: pnpm test:e2e:critical
